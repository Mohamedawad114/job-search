app = "jobsearch-app"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"
  target = "prod"

[build.args]
  DATABASE_URL = "mysql://placeholder:placeholder@localhost/placeholder"

[env]
  NODE_ENV = "production"
  PORT     = "3000"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
  count  = 3
```

